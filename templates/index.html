<!DOCTYPE html>
<html>
<head>
    <title>Smart Sentiment Analyzer 💡</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #ffd6e0, #cde7ff);
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            resize: none;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #ff6f91;
            color: white;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }

        .positive { color: green; }
        .negative { color: red; }
        .neutral { color: gray; }

        .history {
            margin-top: 15px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }

        .item {
            background: #f5f5f5;
            margin: 5px 0;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        canvas {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Sentiment Analyzer 💡</h2>

    <textarea id="text" placeholder="Write something..."></textarea>

    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>

    <canvas id="chart"></canvas>

    <h4>History</h4>
    <div class="history" id="history"></div>
</div>

<script>
let historyData = JSON.parse(localStorage.getItem("history")) || [];

let chart;

function analyze() {
    let text = document.getElementById("text").value;

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
    })
    .then(res => res.json())
    .then(data => {

        // show result
        let result = document.getElementById("result");
        result.innerText = data.sentiment + " (" + data.percent + "%)";

        result.className = "";
        result.classList.add(
            data.sentiment === "Positive" ? "positive" :
            data.sentiment === "Negative" ? "negative" : "neutral"
        );

        // save history
        historyData.push({
            text,
            sentiment: data.sentiment,
            percent: data.percent
        });

        localStorage.setItem("history", JSON.stringify(historyData));

        updateHistory();
        updateChart();
    });
}

function updateHistory() {
    let box = document.getElementById("history");
    box.innerHTML = "";

    historyData.slice(-5).forEach(item => {
        box.innerHTML += `
            <div class="item">
                ${item.text} <br>
                <b>${item.sentiment} - ${item.percent}%</b>
            </div>
        `;
    });
}

function updateChart() {
    let ctx = document.getElementById("chart").getContext("2d");

    let labels = historyData.map((_, i) => "T" + (i+1));
    let values = historyData.map(i => i.percent);

    if(chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Sentiment Trend",
                data: values,
                borderColor: "#ff6f91",
                fill: false
            }]
        }
    });
}

updateHistory();
</script>

</body>
</html>
